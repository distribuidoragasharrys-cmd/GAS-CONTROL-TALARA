<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Gas | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="panel login-panel">
      <div class="brand login-brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M12 3h8v4l3 3v17a2 2 0 0 1-2 2H11a2 2 0 0 1-2-2V10l3-3V3Z"></path>
            <path d="M12 7h8"></path>
          </svg>
        </div>
        <div>
          <span>Distribuidora</span>
          <strong>Harrys</strong>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack compact-flash">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form class="dashboard-form" method="post">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="usuario">Usuario</label>
            <input class="form-control" id="usuario" name="usuario" type="text" autocomplete="username" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="password">Contrasena</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
        </div>
        <button class="primary-button form-submit" type="submit">Ingresar</button>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
