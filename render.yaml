services:
  - type: web
    name: sistema-gas
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 120 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-gas-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: sistema-gas-db
    databaseName: sistema_gas
    user: sistema_gas_user
